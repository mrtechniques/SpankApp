name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      # 3. Set up Java (React Native needs JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      # 4. Set up Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 5. Install npm dependencies
      - name: Install dependencies
        run: npm install

      # 6. Generate a debug keystore (for unsigned/debug APK — no secrets needed)
       # 6. Generate a debug keystore (skip if already exists)
      - name: Generate debug keystore
        run: |
          mkdir -p android/app
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkeypair -v \
              -storetype PKCS12 \
              -keystore android/app/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug, O=Android, C=US"
          else
            echo "Keystore already exists, skipping."
          fi

      # 7. Make gradlew executable
      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      # 8. Cache Gradle dependencies (speeds up future builds)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # 9. Build the debug APK
      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # 10. Upload APK as a downloadable artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpankApp-debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 11. Print APK info
      - name: APK build info
        run: |
          echo "✅ APK built successfully!"
          ls -lh android/app/build/outputs/apk/debug/
